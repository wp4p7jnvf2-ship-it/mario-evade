<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Mario Evade - PhGame Edition (v32.0)</title>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%;
            position: fixed; 
            background-color: #000; 
            font-family: 'Courier New', Courier, monospace; 
            color: white; display: flex; justify-content: center; align-items: center;
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
        }
        #game-container { 
            position: relative; width: 100vw; max-width: 800px; height: 75vh; max-height: 550px; 
            background-color: #5c94fc; border: 4px solid #f8f8f8; border-radius: 10px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; 
        }
        canvas { display: block; width: 100%; height: 100%; }
        #score-board { position: absolute; top: 15px; left: 20px; font-size: 22px; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 100; color: #ffd700; }
        
        #countdown-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.3); display: flex; justify-content: center; align-items: center; z-index: 150;
        }
        #countdown-text {
            font-size: 72px; font-weight: bold; color: #ffd700;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            animation: pulse 0.5s infinite alternate;
        }

        #game-over-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; border-radius: 6px; padding: 20px; box-sizing: border-box;
        }
        #game-over-screen h1 { font-size: 36px; color: #ff5252; margin: 0 0 5px 0; text-shadow: 3px 3px 0 #000; }
        #final-score { font-size: 18px; color: #ffd700; margin: 0 0 10px 0; text-shadow: 2px 2px 0 #000; }
        
        #input-area { display: none; flex-direction: column; align-items: center; margin-bottom: 10px; width: 80%; max-width: 300px; }
        #input-area label { font-size: 13px; color: #fff; margin-bottom: 5px; text-align: center; }
        #player-name-input { 
            width: 100%; padding: 6px; font-size: 15px; border: 3px solid #ffd700; background: #000; color: #fff; 
            text-align: center; font-family: inherit; border-radius: 5px; outline: none; box-sizing: border-box;
        }
        #submit-btn { 
            margin-top: 6px; padding: 5px 15px; font-size: 13px; background-color: #ffd700; color: #000; 
            border: 2px solid #fff; font-weight: bold; cursor: pointer; border-radius: 3px;
        }

        #leaderboard { 
            width: 85%; max-width: 340px; background: rgba(255,255,255,0.1); 
            border: 3px solid #8a2be2; border-radius: 8px; padding: 8px 15px; margin-bottom: 15px; box-sizing: border-box;
        }
        #leaderboard h3 { text-align: center; color: #8a2be2; margin: 0 0 8px 0; font-size: 16px; text-shadow: 1px 1px 0 #fff; background: #fff; padding: 2px 0; border-radius: 3px;}
        .score-row { display: flex; justify-content: space-between; font-size: 14px; margin: 5px 0; font-weight: bold; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 3px;}
        .score-row.highlight { color: #ffd700; text-shadow: 1px 1px 0 #000; }
        .score-rank { width: 30px; }
        .score-name { flex-grow: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
        .score-val { text-align: right; }

        .action-area {
            display: flex; gap: 15px; align-items: center; justify-content: center; width: 85%; max-width: 340px;
        }
        #restart-btn { 
            flex: 1.1; padding: 10px 10px; font-size: 14px; background-color: #f8e8c8; color: #8a2be2; 
            border: 4px solid #a0522d; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: inherit;
            text-align: center; white-space: nowrap;
        }

        /* Buy Me a Coffee Button */
        .bmc-btn {
            flex: 1.4; display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 8px; font-size: 13px; font-weight: bold; color: #000000;
            background-color: #FFDD00; border: 4px solid #000000; border-radius: 5px;
            cursor: pointer; text-decoration: none; font-family: inherit; box-sizing: border-box;
            box-shadow: 3px 3px 0px #555; white-space: nowrap;
        }
        .bmc-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #555;
        }
        .bmc-icon {
            width: 16px; height: 16px; position: relative; display: inline-block; flex-shrink: 0;
        }
        .bmc-icon::before {
            content: ""; position: absolute; width: 2px; height: 2px; background: transparent;
            box-shadow: 
                4px 1px #000, 6px 1px #000, 8px 1px #000,
                2px 3px #000, 4px 3px #fff, 6px 3px #fff, 8px 3px #fff, 10px 3px #000, 12px 3px #000,
                2px 5px #000, 4px 5px #fff, 6px 5px #fff, 8px 5px #fff, 10px 5px #fff, 12px 5px #000,
                2px 7px #000, 4px 7px #fff, 6px 7px #fff, 8px 7px #fff, 10px 7px #000, 12px 7px #000,
                4px 9px #000, 6px 9px #000, 8px 9px #000,
                4px 11px #d2691e, 6px 11px #d2691e;
        }

        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-board">SCORE: 0 (Level 1)</div>
        <div id="countdown-screen"><div id="countdown-text">READY?</div></div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <p id="final-score">FINAL SCORE: 0</p>
            
            <div id="input-area">
                <label>NEW HIGH SCORE! ENTER YOUR NAME:</label>
                <input type="text" id="player-name-input" maxlength="10" placeholder="MAX 10 CHARS">
                <button id="submit-btn">SAVE RECORD</button>
            </div>

            <div id="leaderboard">
                <h3>🏆 HALL OF FAME TOP 5</h3>
                <div id="leaderboard-rows"></div>
            </div>

            <div class="action-area">
                <button id="restart-btn">PLAY AGAIN</button>
                
                <a href="https://www.buymeacoffee.com/phgame_design_creation" target="_blank" class="bmc-btn">
                    <span class="bmc-icon"></span>
                    <span>Buy me a coffee</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('score-board');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreText = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const countdownScreen = document.getElementById('countdown-screen');
        const countdownText = document.getElementById('countdown-text');
        
        const inputArea = document.getElementById('input-area');
        const nameInput = document.getElementById('player-name-input');
        const submitBtn = document.getElementById('submit-btn');
        const leaderboardRows = document.getElementById('leaderboard-rows');

        const V_WIDTH = 800; const V_HEIGHT = 550;
        canvas.width = V_WIDTH; canvas.height = V_HEIGHT;

        const playerW = 32; const playerH = 40;
        const shroomW = 32; const shroomH = 32;
        const blockW = 48; const blockH = 48; 
        const groundY = 470; 
        const lightningW = 16; const lightningH = 30;

        let playerX = 100; let playerY = 430;
        let targetPlayerX = 100; let targetPlayerY = 430; 

        let score = 0; let obstacles = []; let lightnings = [];
        let solidBlocks = []; 
        let gameActive = false; let isCountingDown = false;
        
        // --- ⚙️ 難度微調：調低毒蘑菇初始速度 ---
        let baseSpeed = 2.8; let currentSpeed = 2.8;
        let baseSpawnRate = 1350; let currentSpawnRate = 1350;
        let gameLevel = 1; let levelTimer = 0; let lastSpawnTime = 0;
        
        let lastLightningTime = 0; 
        let currentLightningCD = 2000;   
        let baseLightningSpeed = 5.5;    
        let currentLightningSpeed = 5.5; 

        let spawnedLevels = []; 

        let isSlowed = false;
        let slowTimer = 0;
        const slowDuration = 2000; 

        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        const G = "#00a800"; const P = "#8a2be2"; const S = "#f8e8c8"; 
        const Br = "#904000"; const W = "#f8f8f8"; const K = "#000000"; 
        const D = "#444444"; const L = "#ffd700"; const dG = "#005800"; 
        const lBr = "#b86000"; const O = "#f89800"; 
        const Y = "#ffd700";  
        const _ = null;

        const vibeBoyMap = [
            [_,_,_,_,G,G,G,G,G,G,_,_,_,_,_], [_,_,_,G,G,G,G,G,G,G,G,G,_,_,_],
            [_,_,Br,Br,Br,Br,Br,S,S,Br,S,_,_,_,_], [_,Br,S,Br,S,S,S,Br,S,S,S,_,_,_,_],
            [_,P,P,P,P,P,W,P,W,P,P,P,P,_,_], [P,P,P,P,P,P,W,W,W,P,P,P,P,P,_],
            [S,S,P,W,P,P,P,W,P,P,P,W,S,S,_], [S,S,P,P,W,P,P,P,P,W,P,P,S,S,_],
            [S,S,P,P,P,P,P,P,P,P,P,P,S,S,_], [_,_,D,D,D,D,D,D,D,D,D,D,_,_,_],
            [_,_,D,D,D,_,_,_,D,D,D,_,_,_,_], [_,Br,L,Br,_,_,_,Br,L,Br,_,_,_,_,_],
            [Br,Br,Br,Br,_,_,_,Br,Br,Br,Br,_,_,_,_,_]
        ];

        const shroomMap = [
            [_,_,_,_,P,P,P,P,P,P,_,_,_,_,_,_], [_,_,P,P,P,P,P,P,P,P,P,P,_,_,_,_],
            [_,P,P,W,W,P,P,P,P,W,W,P,P,_,_,_], [P,P,W,W,W,W,P,P,W,W,W,W,P,P,_,_],
            [P,P,W,W,W,W,P,P,W,W,W,W,P,P,_,_], [P,P,P,W,W,P,P,P,P,W,W,P,P,P,_,_],
            [P,P,P,P,P,P,K,K,P,P,P,P,P,P,_,_], [P,P,P,P,K,K,K,K,K,K,P,P,P,P,_,_],
            [_,P,P,P,K,W,K,K,W,K,P,P,P,_,_,_], [_,_,P,P,K,K,K,K,K,K,P,P,_,_,_,_],
            [_,_,_,K,K,K,K,K,K,K,K,_,_,_,_,_], [_,_,K,W,W,W,W,W,W,W,W,K,_,_,_,_],
            [_,_,K,W,K,W,K,K,W,K,W,K,_,_,_,_], [_,_,K,W,W,W,W,W,W,W,W,K,_,_,_,_],
            [_,_,_,K,W,W,W,W,W,W,K,_,_,_,_,_], [_,_,_,_,K,K,K,K,K,K,_,_,_,_,_,_]
        ];

        const marioCloudMap = [
            [_,_,_,_,_,_,W,W,W,W,W,W,_,_,_,_,_,_,_,_],
            [_,_,_,_,W,W,W,W,W,W,W,W,W,W,_,_,_,_,_,_],
            [_,_,W,W,W,W,W,W,W,W,W,W,W,W,W,W,_,_,_,_],
            [_,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,_,_],
            [W,W,W,W,W,W,K,W,W,W,W,K,W,W,W,W,W,W,W,_],
            [W,W,W,W,W,W,K,W,W,W,W,K,W,W,W,W,W,W,W,_],
            [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,_],
            [_,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,_,_],
            [_,_,W,W,W,W,W,W,W,W,W,W,W,W,W,W,_,_,_,_],
            [_,_,_,_,W,W,W,W,W,W,W,W,W,W,_,_,_,_,_,_]
        ];

        const lightningMap = [
            [_,_,_,_,Y,Y,_,_],
            [_,_,_,Y,Y,Y,_,_],
            [_,_,Y,Y,Y,_,_,_],
            [_,Y,Y,Y,_,_,_,_],
            [Y,Y,Y,Y,Y,Y,Y,_],
            [Y,Y,Y,Y,Y,Y,_,_],
            [_,_,_,Y,Y,_,_,_],
            [_,_,Y,Y,_,_,_,_],
            [_,Y,Y,_,_,_,_,_],
            [Y,Y,_,_,_,_,_,_]
        ];

        const blockMap = [
            [K,K,K,K,K,K,K,K,K,K,K,K,K,K,K,K], [K,W,W,W,W,W,W,W,W,W,W,W,W,W,W,K],
            [K,W,O,O,O,O,O,O,O,O,O,O,O,O,Br,K], [K,W,O,O,O,O,O,O,O,O,O,O,O,O,Br,K],
            [K,W,O,O,K,K,K,K,K,K,K,K,O,O,Br,K], [K,W,O,O,K,W,W,W,W,W,W,K,O,O,Br,K],
            [K,W,O,O,K,W,O,O,O,O,O,K,O,O,Br,K], [K,W,O,O,K,W,O,O,O,O,O,K,O,O,Br,K],
            [K,W,O,O,K,W,O,O,O,O,O,K,O,O,Br,K], [K,W,O,O,K,W,O,O,O,O,O,K,O,O,Br,K],
            [K,W,O,O,K,K,K,K,K,K,K,K,O,O,Br,K], [K,W,O,O,O,O,O,O,O,O,O,O,O,O,Br,K],
            [K,W,O,O,O,O,O,O,O,O,O,O,O,O,Br,K], [K,W,Br,Br,Br,Br,Br,Br,Br,Br,Br,Br,Br,Br,Br,K],
            [K,K,K,K,K,K,K,K,K,K,K,K,K,K,K,K], [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_]
        ];

        function drawPixelSprite(map, x, y, pixelSize) {
            for (let row = 0; row < map.length; row++) {
                for (let col = 0; col < map[row].length; col++) {
                    if (map[row][col] !== null) {
                        ctx.fillStyle = map[row][col];
                        ctx.fillRect(x + col * pixelSize, y + row * pixelSize, pixelSize, pixelSize);
                    }
                }
            }
        }

        function getCanvasCoords(offsetX, offsetY, rect) {
            const percentageX = offsetX / rect.width;
            const percentageY = offsetY / rect.height;
            return { x: percentageX * V_WIDTH, y: percentageY * V_HEIGHT };
        }

        function registerTargetPos(mx, my) {
            targetPlayerX = mx - dragOffsetX;
            targetPlayerY = my - dragOffsetY;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!gameActive && !isCountingDown) return;
            const coords = getCanvasCoords(e.offsetX, e.offsetY, canvas.getBoundingClientRect());
            if (coords.x >= playerX && coords.x <= playerX + playerW && coords.y >= playerY && coords.y <= playerY + playerH) {
                isDragging = true;
                dragOffsetX = coords.x - playerX;
                dragOffsetY = coords.y - playerY;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const coords = getCanvasCoords(e.offsetX, e.offsetY, canvas.getBoundingClientRect());
            registerTargetPos(coords.x, coords.y);
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive && !isCountingDown) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const coords = getCanvasCoords(touch.clientX - rect.left, touch.clientY - rect.top, rect);
            
            if (coords.x >= playerX && coords.x <= playerX + playerW && coords.y >= playerY && coords.y <= playerY + playerH) {
                isDragging = true;
                dragOffsetX = coords.x - playerX;
                dragOffsetY = coords.y - playerY;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const coords = getCanvasCoords(touch.clientX - rect.left, touch.clientY - rect.top, rect);
            registerTargetPos(coords.x, coords.y);
        }, { passive: false });

        window.addEventListener('touchend', () => { isDragging = false; });

        function clampPlayer() {
            if (playerX < 0) playerX = 0;
            if (playerX > V_WIDTH - playerW) playerX = V_WIDTH - playerW;
            if (playerY < 0) playerY = 0;
            if (playerY > groundY - playerH) playerY = groundY - playerH; 
        }

        function handleSolidCollisions() {
            for (let block of solidBlocks) {
                if ( playerX < block.x + blockW && playerX + playerW > block.x && playerY < block.y + blockH && playerY + playerH > block.y ) {
                    let overlapX1 = (block.x + blockW) - playerX; 
                    let overlapX2 = (playerX + playerW) - block.x; 
                    let overlapY1 = (block.y + blockH) - playerY; 
                    let overlapY2 = (playerY + playerH) - block.y; 
                    let minOverlap = Math.min(overlapX1, overlapX2, overlapY1, overlapY2);

                    if (minOverlap === overlapX1) { playerX = block.x + blockW; } 
                    else if (minOverlap === overlapX2) { playerX = block.x - playerW; } 
                    else if (minOverlap === overlapY1) { playerY = block.y + blockH; } 
                    else if (minOverlap === overlapY2) { playerY = block.y - playerH; }
                }
            }
        }

        let lastTime = 0; let animationFrameId;
        function gameTick(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            if (gameActive) { updateGame(deltaTime); }
            renderGame();
            animationFrameId = requestAnimationFrame(gameTick);
        }

        function updateGame(dt) {
            score++;
            scoreBoard.innerText = `SCORE: ${score} (Level ${gameLevel})`;

            levelTimer += dt;
            if (levelTimer >= 10000) {
                gameLevel++;
                currentSpeed += 0.45; 
                if (currentSpawnRate > 450) currentSpawnRate -= 70;
                levelTimer = 0;
                
                if (gameLevel >= 5 && gameLevel % 5 === 0) {
                    currentLightningSpeed += 0.8;
                }

                checkAndActivateBlocks();
            }

            if (isSlowed) {
                slowTimer -= dt;
                if (slowTimer <= 0) isSlowed = false;
            }

            if (isDragging) {
                let dx = targetPlayerX - playerX;
                let dy = targetPlayerY - playerY;
                
                if (isSlowed) {
                    const maxSlowSpeed = 2.5; 
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > maxSlowSpeed) {
                        playerX += (dx / dist) * maxSlowSpeed;
                        playerY += (dy / dist) * maxSlowSpeed;
                    } else {
                        playerX = targetPlayerX; playerY = targetPlayerY;
                    }
                } else {
                    playerX = targetPlayerX; playerY = targetPlayerY;
                }
                handleSolidCollisions();
                clampPlayer();
            }

            // 1. Enemy Shroom Spawning
            lastSpawnTime += dt;
            if (lastSpawnTime >= currentSpawnRate) {
                let direction = Math.floor(Math.random() * 4);
                let startX, startY;
                switch(direction) {
                    case 0: startX = Math.random() * (V_WIDTH - shroomW); startY = -shroomH; break;
                    case 1: startX = Math.random() * (V_WIDTH - shroomW); startY = groundY; break;
                    case 2: startX = -shroomW; startY = Math.random() * (groundY - shroomH); break;
                    case 3: 
                    default: startX = V_WIDTH; startY = Math.random() * (groundY - shroomH); break;
                }
                let targetX = playerX + (playerW / 2) - (shroomW / 2);
                let targetY = playerY + (playerH / 2) - (shroomH / 2);
                let angle = Math.atan2(targetY - startY, targetX - startX);
                let velX = Math.cos(angle) * currentSpeed;
                let velY = Math.sin(angle) * currentSpeed;
                obstacles.push({ x: startX, y: startY, vx: velX, vy: velY });
                lastSpawnTime = 0;
            }

            // 2. Ultimate Randomized Homing Lightning Spawning
            lastLightningTime += dt;
            if (lastLightningTime >= currentLightningCD) {
                if (gameLevel >= 5) {
                    let cloudChoice = Math.random() > 0.5 ? 140 : 540; 
                    let startX = cloudChoice + Math.random() * 40;
                    let startY = 100; 

                    let targetX = playerX + (playerW / 2);
                    let targetY = playerY + (playerH / 2);
                    let angle = Math.atan2(targetY - startY, targetX - startX);

                    let velX = Math.cos(angle) * currentLightningSpeed;
                    let velY = Math.sin(angle) * currentLightningSpeed;

                    lightnings.push({ x: startX, y: startY, vx: velX, vy: velY });

                    let minCD = 500;
                    let maxCD = 4000;
                    
                    let levelReduction = (gameLevel - 5) * 150;
                    maxCD = Math.max(1200, maxCD - levelReduction);
                    
                    currentLightningCD = minCD + Math.random() * (maxCD - minCD);
                }
                lastLightningTime = 0;
            }

            for (let i = lightnings.length - 1; i >= 0; i--) {
                let lightning = lightnings[i];
                lightning.x += lightning.vx;
                lightning.y += lightning.vy;

                if (lightning.y > groundY || lightning.x < -50 || lightning.x > V_WIDTH + 50) {
                    lightnings.splice(i, 1);
                    continue;
                }

                if (playerX < lightning.x + lightningW && playerX + playerW > lightning.x && playerY < lightning.y + lightningH && playerY + playerH > lightning.y) {
                    isSlowed = true;
                    slowTimer = slowDuration;
                    targetPlayerX = playerX; targetPlayerY = playerY;
                    lightnings.splice(i, 1);
                    continue;
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x += obs.vx; obs.y += obs.vy;

                if (obs.x < -shroomW - 80 || obs.x > V_WIDTH + 80 || obs.y < -shroomH - 80 || obs.y > groundY + 80) {
                    obstacles.splice(i, 1);
                    continue;
                }

                if ( playerX < obs.x + shroomW && playerX + playerW > obs.x && playerY < obs.y + shroomH && playerY + playerH > obs.y ) {
                    endGame();
                    return;
                }
            }
        }

        function checkAndActivateBlocks() {
            if (gameLevel >= 3 && gameLevel % 3 === 0 && !spawnedLevels.includes(gameLevel)) {
                let seedX = Math.abs(Math.sin(gameLevel * 12.9898 + 78.233)) * 43758.5453;
                let pseudoRandomX = seedX - Math.floor(seedX);
                let seedY = Math.abs(Math.cos(gameLevel * 45.164 + 12.731)) * 23419.1431;
                let pseudoRandomY = seedY - Math.floor(seedY);

                let targetX = 180 + Math.floor(pseudoRandomX * 470);
                let targetY = 80 + Math.floor(pseudoRandomY * 280);

                let tooClose = true; let safetyCounter = 0;
                while (tooClose && safetyCounter < 15) {
                    tooClose = false;
                    for (let block of solidBlocks) {
                        let dx = targetX - block.x; let dy = targetY - block.y;
                        if (Math.sqrt(dx * dx + dy * dy) < 85) { tooClose = true; targetY += 60; if (targetY > 360) targetY = 80; break; }
                    }
                    safetyCounter++;
                }
                solidBlocks.push({ x: targetX, y: targetY });
                spawnedLevels.push(gameLevel); 
            }
        }

        function renderGame() {
            ctx.fillStyle = "#5c94fc"; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT); 

            drawPixelSprite(marioCloudMap, 100, 50, 3); 
            drawPixelSprite(marioCloudMap, 500, 80, 2.5); 

            const tileSize = 32;
            for (let x = 0; x < V_WIDTH; x += tileSize) {
                ctx.fillStyle = G; ctx.fillRect(x, groundY, tileSize, 10);
                ctx.fillStyle = dG; ctx.fillRect(x + 4, groundY + 10, 4, 4); ctx.fillRect(x + 16, groundY + 10, 4, 4);
                ctx.fillStyle = Br; ctx.fillRect(x, groundY + 14, tileSize, V_HEIGHT - (groundY + 14));
                ctx.fillStyle = lBr; ctx.fillRect(x + 8, groundY + 25, 6, 6); ctx.fillRect(x + 20, groundY + 45, 6, 6);
            }

            for (let block of solidBlocks) { drawPixelSprite(blockMap, block.x, block.y, 3); }
            for (let lightning of lightnings) { drawPixelSprite(lightningMap, lightning.x, lightning.y, 2); }

            if (isSlowed) {
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = "#ffd700"; 
                let jitterX = (Math.random() - 0.5) * 3;
                let jitterY = (Math.random() - 0.5) * 3;
                drawPixelSprite(vibeBoyMap, playerX + jitterX, playerY + jitterY, 2);
                ctx.restore();
            } else {
                drawPixelSprite(vibeBoyMap, playerX, playerY, 2);
            }

            for (let obs of obstacles) { drawPixelSprite(shroomMap, obs.x, obs.y, 2); }
        }

        function getLeaderboard() {
            let data = localStorage.getItem('mario_evade_scores');
            return data ? JSON.parse(data) : [
                { name: "MARIO", score: 2500, level: 5 },
                { name: "LUIGI", score: 1800, level: 4 },
                { name: "PEACH", score: 1200, level: 3 },
                { name: "BOWSER", score: 600, level: 2 },
                { name: "TOAD", score: 200, level: 1 }
            ];
        }

        function saveLeaderboard(board) { localStorage.setItem('mario_evade_scores', JSON.stringify(board)); }

        function displayLeaderboard(highlightIndex = -1) {
            const board = getLeaderboard();
            leaderboardRows.innerHTML = '';
            board.forEach((record, index) => {
                const row = document.createElement('div');
                row.className = `score-row ${index === highlightIndex ? 'highlight' : ''}`;
                row.innerHTML = `
                    <span class="score-rank">#${index + 1}</span>
                    <span class="score-name">${record.name}</span>
                    <span class="score-val">${record.score} (Lv.${record.level})</span>
                `;
                leaderboardRows.appendChild(row);
            });
        }

        function endGame() {
            gameActive = false; isDragging = false; cancelAnimationFrame(animationFrameId);
            finalScoreText.innerText = `FINAL SCORE: ${score} (Level ${gameLevel})`;
            
            const board = getLeaderboard();
            const isHighScore = board.length < 5 || score > board[board.length - 1].score;

            if (isHighScore) {
                inputArea.style.display = 'flex';
                nameInput.value = ''; nameInput.focus();
            } else {
                inputArea.style.display = 'none';
            }
            displayLeaderboard();
            gameOverScreen.style.display = 'flex';
        }

        submitBtn.addEventListener('click', () => {
            let name = nameInput.value.trim().toUpperCase();
            if (!name) name = "PLAYER 1";
            if (name.length > 10) name = name.substring(0, 10);

            let board = getLeaderboard();
            board.push({ name: name, score: score, level: gameLevel });
            board.sort((a, b) => b.score - a.score);
            board = board.slice(0, 5);
            saveLeaderboard(board);

            const newIndex = board.findIndex(r => r.score === score && r.name === name);
            inputArea.style.display = 'none';
            displayLeaderboard(newIndex);
        });

        function startCountdown() {
            isCountingDown = true; gameActive = false; isDragging = false; countdownScreen.style.display = 'flex';
            let count = 3; countdownText.innerText = "READY?";
            let timer = setInterval(() => {
                if (count > 0) { countdownText.innerText = count; count--; } 
                else { clearInterval(timer); countdownScreen.style.display = 'none'; isCountingDown = false; gameActive = true; }
            }, 800);
        }

        function initGame() {
            score = 0; gameLevel = 1; levelTimer = 0; lastSpawnTime = 0; lastLightningTime = 0;
            currentSpeed = baseSpeed; currentSpawnRate = baseSpawnRate;
            currentLightningSpeed = baseLightningSpeed; 
            currentLightningCD = 2000; 
            isSlowed = false; obstacles = []; lightnings = []; solidBlocks = []; spawnedLevels = []; isDragging = false;
            
            checkAndActivateBlocks();
            scoreBoard.innerText = "SCORE: 0 (Level 1)";
            gameOverScreen.style.display = 'none';
            playerX = 100; playerY = groundY - playerH; 
            targetPlayerX = playerX; targetPlayerY = playerY;

            lastTime = 0; cancelAnimationFrame(animationFrameId);
            requestAnimationFrame(gameTick); startCountdown();
        }

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
