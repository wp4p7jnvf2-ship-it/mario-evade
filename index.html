                    if (minOverlap === overlapX1) { playerX = block.x + blockW; } else if (minOverlap === overlapX2) { playerX = block.x - playerW; } else if (minOverlap === overlapY1) { playerY = block.y + blockH; } else if (minOverlap === overlapY2) { playerY = block.y - playerH; }
                }
            }
        }

        function hurtPlayer() { if (invulnerableTimer > 0) return; playerLives--; updateLivesUI(); shakeTimer = 300; shakeIntensity = 10; isInvincibleFromHeart = false; if (playerLives <= 0) { playerLives = 0; endGame(); } else { invulnerableTimer = invulnerableDuration; } }
        function healPlayer() { if (playerLives < 3) { playerLives++; updateLivesUI(); } invulnerableTimer = invulnerableDuration; isInvincibleFromHeart = true; blockHitMap = []; ctx.save(); ctx.fillStyle = "rgba(0, 255, 100, 0.35)"; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT); ctx.restore(); }
        function spawnHeartItem(customX = null) { let startX = customX !== null ? customX : (100 + Math.random() * (V_WIDTH - 200)); healHearts.push({ x: startX, y: customX !== null ? playerY - 30 : -heartItemH, vy: 1.6 }); }
        function updateLivesUI() { let heartStr = ""; for(let i=0; i<3; i++) heartStr += (i < playerLives) ? "❤️" : "🖤"; livesBoard.innerText = heartStr; }

        let lastTime = 0; let animationFrameId;
        function gameTick(timestamp) { if (!lastTime) lastTime = timestamp; let deltaTime = timestamp - lastTime; lastTime = timestamp; if (gameActive) { updateGame(deltaTime); } renderGame(); animationFrameId = requestAnimationFrame(gameTick); }

        function updateGame(dt) {
            let timeScale = dt / 16.666; 

            rawScore += (dt * 0.06); score = Math.floor(rawScore); scoreBoard.innerText = `SCORE: ${score} (Level ${gameLevel})`;

            levelTimer += dt;
            if (levelTimer >= 10000) { gameLevel++; currentSpeed += 0.45; if (currentSpawnRate > 450) currentSpawnRate -= 70; levelTimer = 0; if (gameLevel >= 5 && gameLevel % 5 === 0) currentLightningSpeed += 0.8; checkAndActivateBlocks(); currentHeartCD = Math.max(12000, 30000 - (gameLevel - 1) * 1500); }
            if (invulnerableTimer > 0) { invulnerableTimer -= dt; if (invulnerableTimer <= 0) isInvincibleFromHeart = false; }
            if (isSlowed) { slowTimer -= dt; if (slowTimer <= 0) isSlowed = false; }
            if (shakeTimer > 0) shakeTimer -= dt;

            heartBlinkState += dt; heartSpawnTimer += dt;
            if (heartSpawnTimer >= currentHeartCD) { spawnHeartItem(); heartSpawnTimer = 0; }

            for (let i = healHearts.length - 1; i >= 0; i--) { let heart = healHearts[i]; heart.y += heart.vy * timeScale; if (heart.y > groundY) { healHearts.splice(i, 1); continue; } if (playerX < heart.x + heartItemW && playerX + playerW > heart.x && playerY < heart.y + heartItemH && playerY + playerH > heart.y) { healPlayer(); healHearts.splice(i, 1); continue; } }
            for (let block of solidBlocks) { block.x += block.vx * timeScale; if (block.x <= 0) { block.x = 0; block.vx = -block.vx; } else if (block.x >= V_WIDTH - blockW) { block.x = V_WIDTH - blockW; block.vx = -block.vx; } }

            if (isDragging) { playerAnimTimer += dt; if (playerAnimTimer >= 150) { playerFrame = playerFrame === 0 ? 1 : 0; playerAnimTimer = 0; } } else { playerFrame = 0; }

            handleSolidCollisions(); clampPlayer();

            lastSpawnTime += dt;
            if (lastSpawnTime >= currentSpawnRate) {
                let direction = Math.floor(Math.random() * 4); let startX, startY;
                switch(direction) { case 0: startX = Math.random() * (V_WIDTH - shroomW); startY = -shroomH; break; case 1: startX = Math.random() * (V_WIDTH - shroomW); startY = groundY; break; case 2: startX = -shroomW; startY = Math.random() * (groundY - shroomH); break; case 3: default: startX = V_WIDTH; startY = Math.random() * (groundY - shroomH); break; }
                let angle = Math.atan2(playerY + (playerH/2) - (shroomH/2) - startY, playerX + (playerW/2) - (shroomW/2) - startX);
                obstacles.push({ x: startX, y: startY, vx: Math.cos(angle) * currentSpeed, vy: Math.sin(angle) * currentSpeed }); lastSpawnTime = 0;
            }

            lastLightningTime += dt;
            if (lastLightningTime >= currentLightningCD) {
                if (gameLevel >= 5) { let startX = (Math.random() > 0.5 ? 140 : 540) + Math.random() * 40; let startY = 100; let angle = Math.atan2(playerY + (playerH/2) - startY, playerX + (playerW/2) - startX); warningLines.push({ sx: startX, sy: startY, tx: playerX + (playerW/2), ty: playerY + (playerH/2), vx: Math.cos(angle) * currentLightningSpeed, vy: Math.sin(angle) * currentLightningSpeed, timeLeft: 350 }); let levelReduction = (gameLevel - 5) * 150; currentLightningCD = 500 + Math.random() * (Math.max(1200, 4000 - levelReduction) - 500); } lastLightningTime = 0;
            }

            for (let i = warningLines.length - 1; i >= 0; i--) { let w = warningLines[i]; w.timeLeft -= dt; if (w.timeLeft <= 0) { lightnings.push({ x: w.sx, y: w.sy, vx: w.vx, vy: w.vy }); warningLines.splice(i, 1); } }
            for (let i = lightnings.length - 1; i >= 0; i--) { let lightning = lightnings[i]; lightning.x += lightning.vx * timeScale; lightning.y += lightning.vy * timeScale; if (lightning.y > groundY || lightning.x < -50 || lightning.x > V_WIDTH + 50) { lightnings.splice(i, 1); continue; } if (playerX < lightning.x + lightningW && playerX + playerW > lightning.x && playerY < lightning.y + lightningH && playerY + playerH > lightning.y) { isSlowed = true; slowTimer = slowDuration; shakeTimer = 200; shakeIntensity = 5; lightnings.splice(i, 1); continue; } }
            for (let i = obstacles.length - 1; i >= 0; i--) { let obs = obstacles[i]; obs.x += obs.vx * timeScale; obs.y += obs.vy * timeScale; if (obs.x < -shroomW - 80 || obs.x > V_WIDTH + 80 || obs.y < -shroomH - 80 || obs.y > groundY + 80) { obstacles.splice(i, 1); continue; } if ( playerX < obs.x + shroomW && playerX + playerW > obs.x && playerY < obs.y + shroomH && playerY + playerH > obs.y ) { hurtPlayer(); obstacles.splice(i, 1); continue; } }
        }

        function checkAndActivateBlocks() { if (gameLevel >= 3 && gameLevel % 3 === 0 && !spawnedLevels.includes(gameLevel)) { let seedX = Math.abs(Math.sin(gameLevel * 12.9898 + 78.233)) * 43758.5453; let targetX = 180 + Math.floor((seedX - Math.floor(seedX)) * 470); let seedY = Math.abs(Math.cos(gameLevel * 45.164 + 12.731)) * 23419.1431; let targetY = 80 + Math.floor((seedY - Math.floor(seedY)) * 280); for (let block of solidBlocks) { if (Math.sqrt(Math.pow(targetX - block.x, 2) + Math.pow(targetY - block.y, 2)) < 85) { targetY += 60; if (targetY > 360) targetY = 80; } } solidBlocks.push({ x: targetX, y: targetY, vx: (0.8 + Math.random() * 0.7) * (Math.random() > 0.5 ? 1 : -1) }); spawnedLevels.push(gameLevel); } }
        function renderGame() {
            ctx.save(); if (shakeTimer > 0) ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
            ctx.fillStyle = "#5c94fc"; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT); drawPixelSprite(marioCloudMap, 100, 50, 3); drawPixelSprite(marioCloudMap, 500, 80, 2.5); 
            for (let x = 0; x < V_WIDTH; x += 32) { ctx.fillStyle = G; ctx.fillRect(x, groundY, 32, 10); ctx.fillStyle = dG; ctx.fillRect(x + 4, groundY + 10, 4, 4); ctx.fillRect(x + 16, groundY + 10, 4, 4); ctx.fillStyle = Br; ctx.fillRect(x, groundY + 14, 32, V_HEIGHT - (groundY + 14)); ctx.fillStyle = lBr; ctx.fillRect(x + 8, groundY + 25, 6, 6); ctx.fillRect(x + 20, groundY + 45, 6, 6); }
            for (let block of solidBlocks) drawPixelSprite(blockMap, block.x, block.y, 3);
            for (let w of warningLines) { ctx.save(); ctx.strokeStyle = "rgba(255, 0, 0, 0.8)"; ctx.lineWidth = 3; ctx.setLineDash([8, 4]); ctx.beginPath(); ctx.moveTo(w.sx + 16, w.sy); ctx.lineTo(w.sx + 16 + w.vx * 100, w.sy + w.vy * 100); ctx.stroke(); ctx.restore(); }
            for (let lightning of lightnings) drawPixelSprite(lightningMap, lightning.x, lightning.y, 2);
            for (let heart of healHearts) { let map = (Math.floor(heartBlinkState / 150) % 2 === 0) ? pixelHeartRed : pixelHeartWhite; drawPixelSprite(map, heart.x, heart.y, 2.3); }
            if (invulnerableTimer <= 0 || Math.floor(invulnerableTimer / 100) % 2 === 0) { if (isSlowed) { ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = "#ffd700"; drawPixelSprite(vibeBoyFrames[playerFrame], playerX + (Math.random()-0.5)*3, playerY + (Math.random()-0.5)*3, 2); ctx.restore(); } else { if (isInvincibleFromHeart) { ctx.save(); ctx.shadowBlur = 12; ctx.shadowColor = "#00ff66"; drawPixelSprite(vibeBoyFrames[playerFrame], playerX, playerY, 2); ctx.restore(); } else { drawPixelSprite(vibeBoyFrames[playerFrame], playerX, playerY, 2); } } }
            for (let obs of obstacles) drawPixelSprite(realShroomMap, obs.x, obs.y, 2); ctx.restore(); 
        }

        function getMockLeaderboard() { let local = localStorage.getItem('mario_evade_scores'); return local ? JSON.parse(local) : [ { name: "MARIO", score: 2500, level: 5 }, { name: "LUIGI", score: 1800, level: 4 }, { name: "PEACH", score: 1200, level: 3 }, { name: "BOWSER", score: 600, level: 2 }, { name: "TOAD", score: 200, level: 1 } ]; }
        async function fetchGlobalScores(highlightId = null) { leaderboardRows.innerHTML = "FETCHING WORLD RECORDS..."; if (isFirebaseActive) { try { const snapshot = await db.collection("leaderboard").orderBy("score", "desc").limit(100).get(); let records = []; snapshot.forEach(doc => records.push({ id: doc.id, ...doc.data() })); records = records.filter(record => record.name && record.score); renderLeaderboardUI(records, highlightId); } catch (e) { console.error("Firebase Error: ", e); renderLeaderboardUI(getMockLeaderboard(), highlightId, true); } } else { renderLeaderboardUI(getMockLeaderboard(), highlightId, true); } }
        function renderLeaderboardUI(board, highlightIdOrIndex, isMock = false) { leaderboardRows.innerHTML = ''; if (isMock) { leaderboardRows.innerHTML = `<div style='font-size:10px;color:#ff5252;text-align:center;margin-bottom:4px;'>[OFFLINE MOCK MODE]</div>`; } board.forEach((record, index) => { const isHighlight = isFirebaseActive ? (record.id === highlightIdOrIndex) : (index === highlightIdOrIndex); const row = document.createElement('div'); row.className = `score-row ${isHighlight ? 'highlight' : ''}`; row.innerHTML = ` <span class="score-rank">#${index + 1}</span> <span class="score-name">${record.name}</span> <span class="score-val">${record.score} (Lv.${record.level})</span> `; leaderboardRows.appendChild(row); }); }

        async function endGame() { gameActive = false; isDragging = false; cancelAnimationFrame(animationFrameId); menuTitle.innerText = "GAME OVER"; finalScoreText.innerText = `FINAL SCORE: ${score} (Level ${gameLevel})`; finalScoreText.style.display = 'block'; shareBtn.style.display = 'block'; restartBtn.innerText = "PLAY AGAIN 🔄"; let isHighScore = false; if (isFirebaseActive) { try { const snapshot = await db.collection("leaderboard").orderBy("score", "desc").limit(100).get(); if (snapshot.size < 100 || score > snapshot.docs[snapshot.docs.length - 1].data().score) isHighScore = true; } catch(e) { isHighScore = score > getMockLeaderboard()[4].score; } } else { isHighScore = score > getMockLeaderboard()[4].score; } if (isHighScore) { inputArea.style.display = 'flex'; nameInput.value = ''; setTimeout(() => nameInput.focus(), 100); } else { inputArea.style.display = 'none'; } await fetchGlobalScores(); gameOverScreen.style.display = 'flex'; topBar.style.display = 'none'; }
        submitBtn.addEventListener('click', async () => { let name = nameInput.value.trim().toUpperCase() || "PLAYER 1"; if (name.length > 10) name = name.substring(0, 10); submitBtn.disabled = true; if (isFirebaseActive) { try { const docRef = await db.collection("leaderboard").add({ name: name, score: score, level: gameLevel, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); inputArea.style.display = 'none'; await fetchGlobalScores(docRef.id); } catch(e) { console.error(e); } } else { let board = getMockLeaderboard(); board.push({ name: name, score: score, level: gameLevel }); board.sort((a, b) => b.score - a.score); board = board.slice(0, 5); localStorage.setItem('mario_evade_scores', JSON.stringify(board)); const newIndex = board.findIndex(r => r.score === score && r.name === name); inputArea.style.display = 'none'; renderLeaderboardUI(board, newIndex, true); } submitBtn.disabled = false; });
        shareBtn.addEventListener('click', () => { const gameUrl = window.location.href; const shareText = `🍄【Super Mario Evade】全球戰績匯報！\n我剛剛在極限閃避中撐到了 Level ${gameLevel}，奪下 ${score} 分！🏆\n👉 立即挑戰：${gameUrl}`; if (navigator.share) { navigator.share({ title: 'Super Mario Evade', text: shareText, url: gameUrl }).catch(err => console.log(err)); } else { navigator.clipboard.writeText(shareText).then(() => { toastMsg.style.display = 'block'; setTimeout(() => { toastMsg.style.display = 'none'; }, 1500); }).catch(err => alert("Could not copy score: " + err)); } });

        function startCountdown() { isCountingDown = true; gameActive = false; isDragging = false; countdownScreen.style.display = 'flex'; topBar.style.display = 'flex'; let count = 3; countdownText.innerText = "READY?"; let timer = setInterval(() => { if (count > 0) { countdownText.innerText = count; count--; } else { clearInterval(timer); countdownScreen.style.display = 'none'; isCountingDown = false; gameActive = true; } }, 800); }
        function initGame() { if (isFirstLoad) { fetchGlobalScores(); isFirstLoad = false; renderGame(); return; } score = 0; rawScore = 0; gameLevel = 1; levelTimer = 0; lastSpawnTime = 0; lastLightningTime = 0; playerLives = 3; invulnerableTimer = 0; currentSpeed = baseSpeed; currentSpawnRate = baseSpawnRate; currentLightningSpeed = baseLightningSpeed; currentLightningCD = 2000; isSlowed = false; shakeTimer = 0; playerAnimTimer = 0; playerFrame = 0; obstacles = []; lightnings = []; solidBlocks = []; warningLines = []; spawnedLevels = []; isDragging = false; healHearts = []; heartSpawnTimer = 0; currentHeartCD = 30000; heartBlinkState = 0; isInvincibleFromHeart = false; blockHitMap = []; checkAndActivateBlocks(); scoreBoard.innerText = "SCORE: 0 (Level 1)"; updateLivesUI(); gameOverScreen.style.display = 'none'; playerX = 100; playerY = groundY - playerH; lastTime = 0; cancelAnimationFrame(animationFrameId); requestAnimationFrame(gameTick); startCountdown(); }
        restartBtn.addEventListener('click', () => { if (gameOverScreen.style.display !== 'none') { isFirstLoad = false; initGame(); } });
        initGame();
    </script>
