        canvas.addEventListener('touchmove', (e) => { if (!isDragging) return; e.preventDefault(); const rect = canvas.getBoundingClientRect(); const touch = e.touches[0]; const coords = getCanvasCoords(touch.clientX - rect.left, touch.clientY - rect.top, rect); handleInputMove(coords.x, coords.y); }, { passive: false });
        window.addEventListener('touchend', () => { isDragging = false; });

        function clampPlayer() { if (playerX < 0) playerX = 0; if (playerX > V_WIDTH - playerW) playerX = V_WIDTH - playerW; if (playerY < 0) playerY = 0; if (playerY > groundY - playerH) playerY = groundY - playerH; }
        function handleSolidCollisions() {
            for (let i = 0; i < solidBlocks.length; i++) {
                let block = solidBlocks[i];
                if ( playerX < block.x + blockW && playerX + playerW > block.x && playerY < block.y + blockH && playerY + playerH > block.y ) {
                    if (isInvincibleFromHeart && invulnerableTimer > 0 && !blockHitMap.includes(i)) { blockHitMap.push(i); if (getRand() < 0.25) spawnHeartItem(block.x + 8); }
                    let overlapX1 = (block.x + blockW) - playerX; let overlapX2 = (playerX + playerW) - block.x; let overlapY1 = (block.y + blockH) - playerY; let overlapY2 = (playerY + playerH) - block.y; 
                    let minOverlap = Math.min(overlapX1, overlapX2, overlapY1, overlapY2);
                    if (minOverlap === overlapX1) { playerX = block.x + blockW; } else if (minOverlap === overlapX2) { playerX = block.x - playerW; } else if (minOverlap === overlapY1) { playerY = block.y + blockH; } else if (minOverlap === overlapY2) { playerY = block.y - playerH; }
                }
            }
        }

        function hurtPlayer() { if (invulnerableTimer > 0) return; playerLives--; updateLivesUI(); shakeTimer = 300; shakeIntensity = 12; isInvincibleFromHeart = false; if (playerLives <= 0) { playerLives = 0; endGame(); } else { invulnerableTimer = invulnerableDuration; } }
        function healPlayer() { if (playerLives < 3) { playerLives++; updateLivesUI(); } invulnerableTimer = invulnerableDuration; isInvincibleFromHeart = true; blockHitMap = []; ctx.save(); ctx.fillStyle = "rgba(255, 26, 64, 0.35)"; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT); ctx.restore(); }
        function spawnHeartItem(customX = null) { let startX = customX !== null ? customX : (100 + getRand() * (V_WIDTH - 200)); healHearts.push({ x: startX, y: customX !== null ? playerY - 30 : -heartItemH, vy: 1.6 }); }
        function updateLivesUI() { let heartStr = ""; for(let i=0; i<3; i++) heartStr += (i < playerLives) ? "❤️" : "🖤"; livesBoard.innerText = heartStr; }

        let lastTime = 0; let animationFrameId;
        function gameTick(timestamp) { if (!lastTime) lastTime = timestamp; let deltaTime = timestamp - lastTime; lastTime = timestamp; if (gameActive) { updateGame(deltaTime); } renderGame(); animationFrameId = requestAnimationFrame(gameTick); }

        function updateGame(dt) {
            let timeScale = dt / 16.666; rawScore += (dt * 0.06); score = Math.floor(rawScore); scoreBoard.innerText = `SCORE: ${score} (Level ${gameLevel})`;
            levelTimer += dt;
            if (levelTimer >= 10000) { gameLevel++; levelTimer = 0; if (gameLevel >= 5 && gameLevel % 5 === 0) currentLightningSpeed += 0.8; checkAndActivateBlocks(); currentHeartCD = Math.max(12000, 30000 - (gameLevel - 1) * 1500); }
            if (invulnerableTimer > 0) { invulnerableTimer -= dt; if (invulnerableTimer <= 0) isInvincibleFromHeart = false; }
            if (isSlowed) { slowTimer -= dt; if (slowTimer <= 0) isSlowed = false; }
            if (shakeTimer > 0) shakeTimer -= dt;
            heartBlinkState += dt; heartSpawnTimer += dt;
            if (heartSpawnTimer >= currentHeartCD) { spawnHeartItem(); heartSpawnTimer = 0; }

            for (let i = healHearts.length - 1; i >= 0; i--) { let heart = healHearts[i]; heart.y += heart.vy * timeScale; if (heart.y > groundY) { healHearts.splice(i, 1); continue; } if (playerX < heart.x + heartItemW && playerX + playerW > heart.x && playerY < heart.y + heartItemH && playerY + playerH > heart.y) { healPlayer(); healHearts.splice(i, 1); continue; } }
            for (let block of solidBlocks) { block.x += block.vx * timeScale; if (block.x <= 0) { block.x = 0; block.vx = -block.vx; } else if (block.x >= V_WIDTH - blockW) { block.x = V_WIDTH - blockW; block.vx = -block.vx; } }
            if (isDragging) { playerAnimTimer += dt; if (playerAnimTimer >= 150) { playerFrame = playerFrame === 0 ? 1 : 0; playerAnimTimer = 0; } } else { playerFrame = 0; }

            handleSolidCollisions(); clampPlayer();

            lastSpawnTime += dt; let currentCD = Math.max(250, 1350 - (gameLevel - 1) * 150);
            if (lastSpawnTime >= currentCD) {
                let direction = Math.floor(getRand() * 4); let startX, startY;
                switch(direction) { case 0: startX = getRand() * (V_WIDTH - shroomW); startY = -shroomH; break; case 1: startX = getRand() * (V_WIDTH - shroomW); startY = groundY; break; case 2: startX = -shroomW; startY = getRand() * (groundY - shroomH); break; case 3: default: startX = V_WIDTH; startY = getRand() * (groundY - shroomH); break; }
                let angle = Math.atan2(playerY + (playerH/2) - (shroomH/2) - startY, playerX + (playerW/2) - (shroomW/2) - startX);
                obstacles.push({ x: startX, y: startY, vx: Math.cos(angle) * currentSpeed, vy: Math.sin(angle) * currentSpeed }); lastSpawnTime = 0;
            }

            lastLightningTime += dt;
            if (lastLightningTime >= currentLightningCD) {
                if (gameLevel >= 5) { let startX = (getRand() > 0.5 ? 140 : 540) + getRand() * 40; let startY = 100; let angle = Math.atan2(playerY + (playerH/2) - startY, playerX + (playerW/2) - startX); warningLines.push({ sx: startX, sy: startY, tx: playerX + (playerW/2), ty: playerY + (playerH/2), vx: Math.cos(angle) * currentLightningSpeed, vy: Math.sin(angle) * currentLightningSpeed, timeLeft: 350 }); let levelReduction = (gameLevel - 5) * 150; currentLightningCD = 500 + getRand() * (Math.max(1200, 4000 - levelReduction) - 500); } lastLightningTime = 0;
            }

            for (let i = warningLines.length - 1; i >= 0; i--) { let w = warningLines[i]; w.timeLeft -= dt; if (w.timeLeft <= 0) { lightnings.push({ x: w.sx, y: w.sy, vx: w.vx, vy: w.vy }); warningLines.splice(i, 1); } }
            for (let i = lightnings.length - 1; i >= 0; i--) { let lightning = lightnings[i]; lightning.x += lightning.vx * timeScale; lightning.y += lightning.vy * timeScale; if (lightning.y > groundY || lightning.x < -50 || lightning.x > V_WIDTH + 50) { lightnings.splice(i, 1); continue; } if (playerX < lightning.x + lightningW && playerX + playerW > lightning.x && playerY < lightning.y + lightningH && playerY + playerH > lightning.y) { isSlowed = true; slowTimer = slowDuration; shakeTimer = 200; shakeIntensity = 5; lightnings.splice(i, 1); continue; } }
            for (let i = obstacles.length - 1; i >= 0; i--) { let obs = obstacles[i]; obs.x += obs.vx * timeScale; obs.y += obs.vy * timeScale; if (obs.x < -shroomW - 80 || obs.x > V_WIDTH + 80 || obs.y < -shroomH - 80 || obs.y > groundY + 80) { obstacles.splice(i, 1); continue; } if ( playerX < obs.x + shroomW && playerX + playerW > obs.x && playerY < obs.y + shroomH && playerY + playerH > obs.y ) { hurtPlayer(); obstacles.splice(i, 1); continue; } }
        }

        function checkAndActivateBlocks() { 
            if (gameLevel >= 3 && gameLevel % 3 === 0 && !spawnedLevels.includes(gameLevel)) { 
                let seedX = Math.abs(Math.sin(gameLevel * 12.9898 + 78.233)) * 43758.5453; let targetX = 180 + Math.floor((seedX - Math.floor(seedX)) * 470); 
                let seedY = Math.abs(Math.cos(gameLevel * 45.164 + 12.731)) * 23419.1431; let targetY = 80 + Math.floor((seedY - Math.floor(seedY)) * 280); 
                if (solidBlocks.length > 0) { for (let block of solidBlocks) { if (Math.sqrt(Math.pow(targetX - block.x, 2) + Math.pow(targetY - block.y, 2)) < 85) { targetY = (targetY + 60) > 360 ? 90 : (targetY + 60); } } }
                solidBlocks.push({ x: targetX, y: targetY, vx: (0.8 + getRand() * 0.7) * (getRand() > 0.5 ? 1 : -1) }); spawnedLevels.push(gameLevel); 
            } 
        }
        
        function renderGame() {
            ctx.save(); if (shakeTimer > 0) ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
            ctx.fillStyle = "#1a3053"; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT); 
            drawPixelSprite(marioCloudMap, 100, 50, 3); drawPixelSprite(marioCloudMap, 500, 80, 2.5); 
            for (let x = 0; x < V_WIDTH; x += 32) { ctx.fillStyle = "#2c3d52"; ctx.fillRect(x, groundY, 32, 10); ctx.fillStyle = "#1e2936"; ctx.fillRect(x + 4, groundY + 10, 4, 4); ctx.fillRect(x + 16, groundY + 10, 4, 4); ctx.fillStyle = "#131b24"; ctx.fillRect(x, groundY + 14, 32, V_HEIGHT - (groundY + 14)); ctx.fillStyle = "#243242"; ctx.fillRect(x + 8, groundY + 25, 6, 6); ctx.fillRect(x + 20, groundY + 45, 6, 6); }
            for (let block of solidBlocks) drawPixelSprite(blockMap, block.x, block.y, 3);
            for (let w of warningLines) { ctx.save(); ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx.lineWidth = 3; ctx.setLineDash([8, 4]); ctx.beginPath(); ctx.moveTo(w.sx + 8, w.sy); ctx.lineTo(w.sx + 8 + w.vx * 100, w.sy + w.vy * 100); ctx.stroke(); ctx.restore(); }
            for (let lightning of lightnings) drawPixelSprite(lightningMap, lightning.x, lightning.y, 2.3);
            for (let heart of healHearts) { let map = (Math.floor(heartBlinkState / 150) % 2 === 0) ? pixelHeartRed : pixelHeartWhite; drawPixelSprite(map, heart.x, heart.y, 2.3); }
            if (invulnerableTimer <= 0 || Math.floor(invulnerableTimer / 100) % 2 === 0) { if (isSlowed) { ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = "#ffffff"; drawPixelSprite(vibeBoyFrames[playerFrame], playerX + (Math.random()-0.5)*3, playerY + (Math.random()-0.5)*3, 2.2); ctx.restore(); } else { if (isInvincibleFromHeart) { ctx.save(); ctx.shadowBlur = 12; ctx.shadowColor = "#fffa00"; drawPixelSprite(vibeBoyFrames[playerFrame], playerX, playerY, 2.2); ctx.restore(); } else { drawPixelSprite(vibeBoyFrames[playerFrame], playerX, playerY, 2.2); } } }
            for (let obs of obstacles) drawPixelSprite(realShroomMap, obs.x, obs.y, 2.5); ctx.restore(); 
        }

        // ====================================================
        // 第四區：Firebase 排行榜數據
        // ====================================================
        async function fetchGlobalScores(highlightId = null) {
            leaderboardRows.innerHTML = "FETCHING ARCADE RECORDS..."; const titleEl = document.getElementById('leaderboard-title');
            if (titleEl) titleEl.innerText = isDailyChallenge ? "📅 TODAY'S CHALLENGE" : "🌍 GLOBAL TOP 100";
            if (isFirebaseActive) {
                try {
                    let query = db.collection("leaderboard"); let records = [];
                    if (isDailyChallenge) {
                        const d = new Date(); const currentTodayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                        query = query.where("mode", "==", "daily").where("date", "==", currentTodayStr).orderBy("score", "desc").limit(100);
                        const snapshot = await query.get(); snapshot.forEach(doc => records.push({ id: doc.id, ...doc.data() }));
                    } else {
                        query = query.orderBy("score", "desc").limit(150); const snapshot = await query.get();
                        snapshot.forEach(doc => { const data = doc.data(); if (data.mode !== "daily" && records.length < 100) { records.push({ id: doc.id, ...data }); } });
                    }
                    renderLeaderboardUI(records, highlightId);
                } catch (e) { console.error(e); renderLeaderboardUI(getMockLeaderboard(), highlightId, true); }
            } else { renderLeaderboardUI(getMockLeaderboard(), highlightId, true); }
        }
        function getMockLeaderboard() { let local = localStorage.getItem('mario_evade_scores'); return local ? JSON.parse(local) : [ { name: "MASTER_DASH", score: 1890, level: 5 }, { name: "EVADE_PRO", score: 1745, level: 4 }, { name: "SHROOM_SKILL", score: 1601, level: 3 }, { name: "RETRO_REBEL", score: 1480, level: 2 }, { name: "PIXEL_PIPELINE", score: 1350, level: 1 } ]; }
        function renderLeaderboardUI(board, highlightIdOrIndex, isMock = false) { leaderboardRows.innerHTML = ''; board.forEach((record, index) => { const isHighlight = isFirebaseActive ? (record.id === highlightIdOrIndex) : (index === highlightIdOrIndex); const row = document.createElement('div'); row.className = `score-row ${isHighlight ? 'highlight' : ''}`; row.innerHTML = ` <span class="score-rank">${index + 1}.</span> <span class="score-name">${record.name}</span> <span class="score-val">${record.score} (Lv.${record.level})</span> `; leaderboardRows.appendChild(row); }); }

        // ====================================================
        // 第五區：生命週期控制與【⚡CORS 安全跨域防護圖片原生分享】
        // ====================================================
        async function endGame() { 
            gameActive = false; isDragging = false; cancelAnimationFrame(animationFrameId); 
            const subTitleEl = document.getElementById('sub-header-title'); if (subTitleEl) subTitleEl.innerText = isDailyChallenge ? "📅 DAILY CHALLENGE" : "🕹️ ARCADE MODE";
            finalScoreText.innerText = `FINAL SCORE: ${score} (Level ${gameLevel})`; finalScoreText.style.display = 'block'; 
            inputArea.style.display = 'none'; mainMenuPanel.style.display = 'none';
            let isHighScore = false; 
            if (isFirebaseActive) { 
                try {
                    let query = db.collection("leaderboard"); let currentLowScore = 0;
                    if (isDailyChallenge) {
                        const d = new Date(); const currentTodayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                        query = query.where("mode", "==", "daily").where("date", "==", currentTodayStr).orderBy("score", "desc").limit(100);
                        const snapshot = await query.get(); if (snapshot.size < 100 || score > snapshot.docs[snapshot.docs.length - 1].data().score) isHighScore = true;
                    } else {
                        query = query.orderBy("score", "desc").limit(150); const snapshot = await query.get(); let normalCount = 0;
                        snapshot.forEach(doc => { if (doc.data().mode !== "daily") { normalCount++; currentLowScore = doc.data().score; } });
                        if (normalCount < 100 || score > currentLowScore) isHighScore = true;
                    }
                } catch(e) { isHighScore = score > getMockLeaderboard()[4].score; } 
            } else { isHighScore = score > getMockLeaderboard()[4].score; } 
            if (isHighScore) { inputArea.style.display = 'flex'; nameInput.value = ''; setTimeout(() => nameInput.focus(), 100); } else { mainMenuPanel.style.display = 'flex'; await fetchGlobalScores(); } 
            gameOverScreen.style.display = 'flex'; topBar.style.display = 'none'; 
        }

        submitBtn.addEventListener('click', async () => { 
            let name = nameInput.value.trim().toUpperCase() || "AAA"; if (name.length > 10) name = name.substring(0, 10); if (isDailyChallenge) name = name.substring(0, 7) + "(D)";
            submitBtn.disabled = true; const d = new Date(); const currentTodayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const recordData = { name: name, score: score, level: gameLevel, mode: isDailyChallenge ? "daily" : "normal", date: currentTodayStr, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
            if (isFirebaseActive) { try { const docRef = await db.collection("leaderboard").add(recordData); inputArea.style.display = 'none'; mainMenuPanel.style.display = 'flex'; await fetchGlobalScores(docRef.id); } catch(e) { console.error(e); } } 
            else { let board = getMockLeaderboard(); board.push(recordData); board.sort((a, b) => b.score - a.score); board = board.slice(0, 5); localStorage.setItem('mario_evade_scores', JSON.stringify(board)); inputArea.style.display = 'none'; mainMenuPanel.style.display = 'flex'; renderLeaderboardUI(board, board.findIndex(r => r.score === score), true); } 
            submitBtn.disabled = false; 
        });

        // 🖼️ 100% 安全的純畫布渲染：完全避開 DOM 跨域污染，杜絕 toBlob 出現 null 崩潰
        function generateShareImage() {
            const sCanvas = document.getElementById('shareCanvas'); const sCtx = sCanvas.getContext('2d');
            sCtx.fillStyle = "#1a3053"; sCtx.fillRect(0, 0, 600, 315);
            sCtx.strokeStyle = "#ffffff"; sCtx.lineWidth = 4; sCtx.strokeRect(10, 10, 580, 295);
            drawPixelSprite(marioCloudMap, 40, 30, 2, sCtx); drawPixelSprite(marioCloudMap, 420, 50, 1.5, sCtx);
            sCtx.fillStyle = "#e52521"; sCtx.font = "bold 26px sans-serif"; sCtx.textAlign = "center";
            sCtx.fillText("SUPER EVADE MASTER", 300, 75);
            sCtx.fillStyle = "#ffffff"; sCtx.font = "bold 16px sans-serif";
            sCtx.fillText("💥 MISSION SCORE REPORT 💥", 300, 115);
            sCtx.fillStyle = "#ffd700"; sCtx.font = "bold 42px sans-serif";
            sCtx.fillText(`${score} PTS`, 300, 175);
            sCtx.fillStyle = "#ffffff"; sCtx.font = "bold 18px sans-serif";
            sCtx.fillText(`SURVIVED LEVEL: ${gameLevel}`, 300, 225);
            sCtx.fillStyle = "rgba(255,255,255,0.4)"; sCtx.font = "12px sans-serif";
            sCtx.fillText("ARCADE v2.01.2 • CHROME SHARE MODE", 300, 278);
            drawPixelSprite(vibeBoyFrame0, 110, 135, 2.6, sCtx); drawPixelSprite(realShroomMap, 440, 145, 2.6, sCtx);
        }

        // 📢 終極完全體原生分享核心監聽器（封殺 Tainted Canvas 與 Windows 審查拒收 Bug）
        shareBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const modeText = isDailyChallenge ? "每日挑戰榜" : "全球街機榜";
            
            // 構建純文字備援戰報格式
            const textReport = `🥷 SUPER EVADE MASTER 戰報\n🎯 模式：${modeText}\n🏆 分數：${score} 分\n⚡ 等級：Level ${gameLevel}\n🔗 挑戰連結：${window.location.href}\n(貼心提示：已全自動複製到剪貼簿，可直接貼上分享！ )`;

            try {
                generateShareImage(); // 背景無污染繪圖
                const sCanvas = document.getElementById('shareCanvas');
                
                // 執行安全 Blob 轉換
                sCanvas.toBlob(async (blob) => {
                    // 防線 1：如果因為瀏覽器權限或極端 CORS 導致 blob 失敗，立即啟動文字剪貼簿機制，絕不讓按鈕卡死
                    if (!blob) {
                        executeTextFallback(textReport);
                        return;
                    }
                    
                    // 防線 2：補全 Windows 系統原生審查必須的 lastModified 時間戳
                    const file = new File([blob], "score_report.png", { 
                        type: "image/png",
                        lastModified: Date.now() 
                    });

                    const shareData = {
                        title: "🥷 SUPER EVADE MASTER 戰報",
                        text: `我在《Super Evade Master》【${modeText}】成功突破地獄，斬獲了 ${score} 分 (達到了 Level ${gameLevel})！快來打破我的街機紀錄！🔥`,
                        url: window.location.href,
                        files: [file]
                    };

                    // 防線 3：檢查當前環境是否完美支援真實檔案分享
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share(shareData); // 🎯 成功召喚 Windows / 手機的原生大面板
                            return;
                        } catch (err) {
                            if (err.name === 'AbortError') return; // 用戶自行關閉面板不作錯誤處理
                            console.warn("Native share error, switching to fallback:", err);
                        }
                    }
                    
                    // 如果不支援檔案分享（例如某些舊版 Chrome），自動降級進入文字防線
                    executeTextFallback(textReport);
                }, "image/png");

            } catch (canvasErr) {
                console.error("Canvas share process error:", canvasErr);
                executeTextFallback(textReport);
            }
        });

        // 📋 終極自動降級文字複製機制
        async function executeTextFallback(textReport) {
            try {
                await navigator.clipboard.writeText(textReport);
                showToast("COPIED RECORD TO CLIPBOARD! 📋");
            } catch (clipErr) {
                const textArea = document.createElement("textarea");
                textArea.value = textReport;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast("COPIED RECORD TO CLIPBOARD! 📋");
            }
        }

        function showToast(text) { toastMsg.innerText = text; toastMsg.style.display = 'block'; setTimeout(() => { toastMsg.style.display = 'none'; }, 2200); }

        // ====================================================
        // 第六區：控制中心
        // ====================================================
        const toggleBoardBtn = document.getElementById('toggle-board-btn');
        if (toggleBoardBtn) { toggleBoardBtn.addEventListener('click', async (e) => { e.stopPropagation(); isDailyChallenge = !isDailyChallenge; await fetchGlobalScores(); }); }
        function startCountdown() { isCountingDown = true; gameActive = false; isDragging = false; countdownScreen.style.display = 'flex'; topBar.style.display = 'flex'; let count = 3; countdownText.innerText = "READY?"; let timer = setInterval(() => { if (count > 0) { countdownText.innerText = count; count--; } else { clearInterval(timer); countdownScreen.style.display = 'none'; isCountingDown = false; gameActive = true; } }, 800); }
        
        function initGame() { 
            if (isFirstLoad) { fetchGlobalScores(); isFirstLoad = false; renderGame(); mainMenuPanel.style.display = 'flex'; return; } 
            score = 0; rawScore = 0; gameLevel = 1; levelTimer = 0; lastSpawnTime = 0; lastLightningTime = 0; playerLives = 3; invulnerableTimer = 0; isSlowed = false; shakeTimer = 0; playerAnimTimer = 0; playerFrame = 0; obstacles = []; lightnings = []; solidBlocks = []; warningLines = []; spawnedLevels = []; isDragging = false; healHearts = []; heartSpawnTimer = 0; currentHeartCD = 30000; heartBlinkState = 0; isInvincibleFromHeart = false; blockHitMap = []; 
            lastTime = 0; initDailySeedAndDate(); checkAndActivateBlocks(); scoreBoard.innerText = "SCORE: 0 (Level 1)"; updateLivesUI(); gameOverScreen.style.display = 'none'; playerX = 100; playerY = groundY - playerH; cancelAnimationFrame(animationFrameId); requestAnimationFrame(gameTick); startCountdown(); 
        }
        
        restartBtn.addEventListener('click', () => { isDailyChallenge = false; if (gameOverScreen.style.display !== 'none') { isFirstLoad = false; initGame(); } });
        dailyBtn.addEventListener('click', () => { isDailyChallenge = true; if (gameOverScreen.style.display !== 'none') { isFirstLoad = false; initGame(); } });

        initDailySeedAndDate(); initGame();
    </script>
